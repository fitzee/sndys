# Pure Modula-2 implementation. No external C dependencies.
# Binary SVM with linear/RBF kernels using simplified SMO.
# Multi-class via one-vs-rest strategy.
manifest_version=1
name=m2svm
version=0.1.0
edition=pim4
entry=src/SVM.mod
includes=src

