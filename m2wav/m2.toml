# m2.toml - m2wav: WAV audio file reader and writer
#
# Reads and writes PCM WAV files (8-bit and 16-bit).
# Samples are normalized to LONGREAL [-1.0, 1.0].
# Supports mono/stereo, stereo-to-mono conversion.
manifest_version=1
name=m2wav
version=0.1.0
edition=pim4
entry=src/Wav.mod
includes=src

[deps]

[test]
entry=tests/wav_tests.mod

[cc]
